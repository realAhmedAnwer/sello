<section class="-mt-3 pb-4 md:-mt-6 md:pb-6">
  <div class="container">
    <div
      class="mx-auto grid max-w-5xl gap-3 rounded-panel border border-white/70 bg-white/90 p-3 shadow-card backdrop-blur md:grid-cols-2 lg:grid-cols-4"
    >
      @for (benefit of benefits; track benefit.title) {
        <article
          class="flex items-center gap-3 rounded-card border border-slate-100 bg-white px-4 py-4 transition duration-300 hover:-translate-y-0.5 hover:border-primary/20 hover:shadow-lg hover:shadow-primary/5"
        >
          <div
            class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full text-base"
            [class]="benefit.iconClasses"
          >
            <i [class]="benefit.icon"></i>
          </div>

          <div class="min-w-0">
            <h3 class="text-sm font-semibold text-secondary">{{ benefit.title }}</h3>
            <p class="text-xs leading-5 text-slate-500">{{ benefit.subtitle }}</p>
          </div>
        </article>
      }
    </div>
  </div>
</section>
