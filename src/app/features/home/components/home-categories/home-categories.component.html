<section class="py-10">
  <div class="container">
    <h2 class="test-3xl font-semibold">Shop By <span class="text-primary">Category</span></h2>
    <div class="mt-6 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
      @for (category of categoryList(); track category._id) {
        <div class="shadow rounded p-4 text-center flex flex-col items-center">
          <img [src]="category.image" class="size-20 rounded-full" [alt]="category.name" />
          <h3>{{ category.name }}</h3>
        </div>
      }
    </div>
  </div>
</section>
