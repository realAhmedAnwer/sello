<section class="py-10 md:py-14">
  <div class="container">
    <app-section-title title="Shop By" highlight="Category" />
    <div class="mt-8 grid gap-5 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6">
      @for (category of categoryList(); track category._id) {
        <div
          class="group rounded-card border border-white/70 bg-white/85 p-5 text-center shadow-card backdrop-blur transition duration-300 hover:-translate-y-1 hover:shadow-card-hover"
        >
          <div
            class="mx-auto flex size-24 items-center justify-center rounded-full bg-primary-soft ring-8 ring-white shadow-sm"
          >
            <img [src]="category.image" class="size-16 rounded-full object-cover" [alt]="category.name" />
          </div>
          <h3 class="mt-4 text-base font-semibold text-slate-800 transition-colors group-hover:text-primary">
            {{ category.name }}
          </h3>
        </div>
      }
    </div>

    <div class="mt-10 grid gap-5 lg:grid-cols-2">
      @for (promo of promos; track promo.title) {
        <article
          class="group relative isolate overflow-hidden rounded-panel p-6 md:p-7"
          [class]="promo.containerClasses"
        >
          <div
            class="absolute -right-10 -top-12 h-36 w-36 rounded-full blur-sm transition duration-500 group-hover:scale-110"
            [class]="promo.orbClasses"
          ></div>
          <div
            class="absolute right-12 top-16 h-16 w-16 rounded-full"
            [class]="promo.orbClasses"
          ></div>
          <div
            class="absolute -bottom-12 right-8 h-36 w-36 rounded-full border border-white/10 bg-white/6"
          ></div>
          <div
            class="absolute inset-y-0 right-0 hidden w-40 bg-gradient-to-l from-white/10 to-transparent lg:block"
          ></div>

          <div class="relative grid items-end gap-6 lg:grid-cols-[minmax(0,1fr)_140px]">
            <div class="max-w-sm">
              <span
                class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold"
                [class]="promo.badgeClasses"
              >
                <i class="fas fa-bolt mr-2 text-[10px]"></i>{{ promo.badge }}
              </span>

              <h3 class="mt-4 text-2xl font-bold leading-tight md:text-[2rem]">{{ promo.title }}</h3>
              <p class="mt-2 text-sm leading-6 text-white/80">{{ promo.description }}</p>

              <div class="mt-6 flex flex-wrap items-center gap-3">
                <span class="text-3xl font-black tracking-tight">{{ promo.discount }}</span>
                <span class="rounded-full border border-white/18 bg-white/10 px-3 py-1 text-xs font-semibold text-white/90">
                  Code: {{ promo.code }}
                </span>
              </div>

              <div class="mt-6 flex flex-wrap items-center gap-3">
                <button
                  class="inline-flex items-center gap-2 rounded-full px-5 py-2.5 text-sm font-semibold transition"
                  [class]="promo.buttonClasses"
                >
                  {{ promo.cta }}
                  <i class="fas fa-arrow-right text-xs transition-transform group-hover:translate-x-0.5"></i>
                </button>

                <span class="text-xs font-medium text-white/75">{{ promo.note }}</span>
              </div>
            </div>

            <div class="hidden lg:flex">
              <div
                class="ml-auto flex h-32 w-32 flex-col items-center justify-center rounded-full border backdrop-blur-sm"
                [class]="promo.panelClasses"
              >
                <div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/16 text-xl text-white">
                  <i [class]="promo.icon"></i>
                </div>
                <span class="mt-3 text-center text-xs font-semibold uppercase tracking-[0.22em] text-white/80">
                  Fresh Picks
                </span>
              </div>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
