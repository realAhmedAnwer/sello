<section class="py-10 md:py-14">
  <div class="container">
    <app-section-title title="All" highlight="Products" />
    <div class="mt-8 grid gap-5 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
      @for (
        product of productList()
          | paginate
            : {
                id: 'shop_pagination',
                itemsPerPage: pageSize(),
                currentPage: currentPage(),
                totalItems: totalItems(),
              };
        track product._id
      ) {
        <app-product-card [product]="product"></app-product-card>
      }
    </div>
    <div class="flex justify-center items-center mt-4">
      <pagination-controls
        (pageChange)="getAllProducts($event)"
        id="shop_pagination"
        [maxSize]="9"
        [directionLinks]="true"
        [autoHide]="true"
        [responsive]="true"
        previousLabel="Previous"
        nextLabel="Next"
        screenReaderPaginationLabel="Pagination"
        screenReaderPageLabel="page"
        screenReaderCurrentLabel="You're on page"
      >
      </pagination-controls>
    </div>
  </div>
</section>
