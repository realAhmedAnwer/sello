<nav
  class="sticky top-0 z-40 w-full border-b border-white/60 bg-white/75 px-4 py-4 font-sans shadow-[0_10px_40px_rgba(15,23,42,0.06)] backdrop-blur-xl md:px-6"
>
  <div class="container flex items-center justify-between gap-4">
    <a class="shrink-0 rounded-2xl bg-white/80 p-2 shadow-sm ring-1 ring-slate-100">
      <img src="/images/sello-logo.svg" alt="Sello" class="h-7 md:h-8" />
    </a>

    <div class="hidden max-w-xl grow lg:block">
      <div class="group relative">
        <input
          type="text"
          placeholder="Search for products..."
          class="w-full rounded-full border border-white/70 bg-surface-alt px-6 py-3 pr-14 text-sm text-secondary outline-none ring-1 ring-transparent placeholder:text-slate-400 focus:border-primary/20 focus:ring-primary/20"
        />
        <button
          class="absolute bottom-1 right-1 top-1 flex w-11 items-center justify-center rounded-full bg-primary text-white shadow-lg shadow-primary/20 transition-colors hover:bg-primary-strong"
        >
          <i class="fas fa-search text-xs"></i>
        </button>
      </div>
    </div>

    <div
      class="hidden items-center gap-2 rounded-full border border-white/70 bg-white/80 px-3 py-2 shadow-sm backdrop-blur md:flex"
    >
      <a
        routerLink="/"
        routerLinkActive="text-primary"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition-colors hover:bg-primary-soft hover:text-primary"
        >Home</a
      >
      <a
        routerLink="/shop"
        routerLinkActive="text-primary"
        class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition-colors hover:bg-primary-soft hover:text-primary"
        >Shop</a
      >
      <div class="group relative">
        <button
          class="flex items-center gap-1 rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition-colors group-hover:bg-primary-soft group-hover:text-primary"
        >
          Categories
          <i class="fas fa-chevron-down text-2xs transition-transform group-hover:rotate-180"></i>
        </button>
        <div
          class="invisible absolute left-0 z-50 mt-2 w-52 rounded-3xl border border-white/70 bg-white/95 p-2 opacity-0 shadow-card transition-all duration-200 group-hover:visible group-hover:opacity-100"
        >
          <ul class="text-sm text-slate-700">
            <li>
              <a
                routerLink="/categories"
                routerLinkActive="text-primary"
                class="block rounded-2xl px-4 py-3 font-medium hover:bg-primary-soft hover:text-primary"
                >All Categories</a
              >
            </li>
            <li>
              <a
                class="block rounded-2xl px-4 py-3 font-medium hover:bg-primary-soft hover:text-primary"
                >Electronics</a
              >
            </li>
          </ul>
        </div>
      </div>
      <a
        routerLink="/brands"
        routerLinkActive="text-primary"
        class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition-colors hover:bg-primary-soft hover:text-primary"
        >Brands</a
      >
    </div>

    <div class="flex items-center gap-2 md:gap-4">
      <button
        class="flex h-11 w-11 items-center justify-center rounded-full border border-white/70 bg-white/85 text-slate-600 shadow-sm transition-all hover:bg-primary-soft hover:text-primary lg:hidden"
      >
        <i class="fas fa-search text-lg"></i>
      </button>
      <button
        routerLink="/wishlist"
        routerLinkActive="text-primary"
        class="relative flex h-11 w-11 items-center justify-center rounded-full border border-white/70 bg-white/85 text-slate-600 shadow-sm transition-all hover:bg-primary-soft hover:text-primary"
      >
        <i class="far fa-heart text-xl"></i>
      </button>
      <button
        routerLink="/cart"
        routerLinkActive="text-primary"
        class="relative flex h-11 w-11 items-center justify-center rounded-full border border-white/70 bg-white/85 text-slate-600 shadow-sm transition-all hover:bg-primary-soft hover:text-primary"
      >
        <i class="fas fa-shopping-cart text-xl"></i>
        <span
          class="absolute right-1 top-1 rounded-full border-2 border-white bg-primary px-1.5 text-2xs font-bold text-white shadow-sm"
          >3</span
        >
      </button>

      <div class="hidden items-center gap-3 pl-2 sm:flex md:border-l md:border-slate-200 md:pl-4">
        @if (isLogged()) {
          <button
            class="flex items-center gap-2 rounded-full px-3 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-danger/10 hover:text-danger cursor-pointer"
          >
            Sign Out <i class="fa-solid fa-arrow-right-from-bracket text-lg"></i>
          </button>
        } @else {
          <a
            routerLink="/login"
            routerLinkActive="text-primary"
            class="flex items-center gap-2 rounded-full px-3 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-primary-soft hover:text-primary"
          >
            <i class="far fa-user text-lg"></i> Sign In
          </a>
          <a
            routerLink="/register"
            routerLinkActive="text-primary"
            class="flex items-center gap-2 rounded-full bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-primary/20 transition-colors hover:bg-primary-strong"
          >
            <i class="fas fa-user-plus text-lg"></i> Sign Up
          </a>
        }
      </div>

      <button
        type="button"
        data-drawer-target="drawer-right"
        data-drawer-show="drawer-right"
        data-drawer-placement="right"
        class="rounded-full border border-white/70 bg-white/85 p-2 text-slate-600 shadow-sm transition-colors hover:bg-primary-soft hover:text-primary focus:outline-none md:hidden"
      >
        <i class="fas fa-bars text-2xl"></i>
      </button>
    </div>
  </div>
</nav>

<div
  id="drawer-right"
  class="fixed top-0 right-0 z-50 h-screen w-80 translate-x-full overflow-y-auto border-l border-white/60 bg-white/95 p-6 shadow-2xl backdrop-blur-xl transition-transform"
  tabindex="-1"
>
  <div class="mb-8 flex items-center justify-between">
    <div class="rounded-2xl bg-surface-alt p-2 shadow-sm">
      <img src="/images/sello-logo.svg" alt="Logo" class="h-7" />
    </div>
    <button
      type="button"
      data-drawer-hide="drawer-right"
      class="rounded-full bg-surface-alt p-2 text-slate-500 hover:bg-primary-soft hover:text-primary"
    >
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="relative mb-8">
    <input
      type="text"
      placeholder="Search products..."
      class="w-full rounded-2xl border border-white/70 bg-surface-alt px-4 py-3 text-sm outline-none focus:border-primary/20 focus:ring-primary/20"
    />
    <button class="absolute right-3 top-3 text-primary"><i class="fas fa-search"></i></button>
  </div>

  <nav class="mb-4 border-b border-slate-100 pb-4">
    <ul class="space-y-2 font-medium text-slate-800">
      <li>
        <a
          routerLink="/"
          routerLinkActive="text-primary"
          class="block rounded-2xl px-4 py-3 transition-colors hover:bg-primary-soft hover:text-primary"
          >Home</a
        >
      </li>
      <li>
        <a
          routerLink="/shop"
          routerLinkActive="text-primary"
          class="block rounded-2xl px-4 py-3 transition-colors hover:bg-primary-soft hover:text-primary"
          >Shop</a
        >
      </li>
      <li>
        <a
          routerLink="/categories"
          routerLinkActive="text-primary"
          class="block rounded-2xl px-4 py-3 transition-colors hover:bg-primary-soft hover:text-primary"
          >Categories</a
        >
      </li>
    </ul>
  </nav>

  <div class="mb-2 space-y-2">
    <a
      routerLink="/wishlist"
      routerLinkActive="text-primary"
      class="group flex cursor-pointer items-center gap-2 rounded-2xl p-2 transition-colors hover:bg-primary-soft"
    >
      <div
        class="flex h-11 w-11 items-center justify-center rounded-full bg-primary-soft text-primary"
      >
        <i class="far fa-heart text-lg"></i>
      </div>
      <span class="font-medium text-slate-700 group-hover:text-primary">Wishlist</span>
    </a>
    <a
      routerLink="/cart"
      routerLinkActive="text-primary"
      class="group flex cursor-pointer items-center gap-2 rounded-2xl p-2 transition-colors hover:bg-primary-soft"
    >
      <div
        class="flex h-11 w-11 items-center justify-center rounded-full bg-primary-soft text-primary"
      >
        <i class="fas fa-shopping-cart text-lg"></i>
      </div>
      <span class="font-medium text-slate-700 group-hover:text-primary">My Cart</span>
    </a>
  </div>

  <div class="space-y-2 border-t border-slate-100 pt-4">
    <a
      routerLink="/login"
      routerLinkActive="text-primary"
      class="group flex cursor-pointer items-center gap-2 rounded-2xl p-2 transition-colors hover:bg-primary-soft"
    >
      <div
        class="flex h-11 w-11 items-center justify-center rounded-full bg-surface-alt text-slate-600 transition-colors group-hover:bg-primary-soft group-hover:text-primary"
      >
        <i class="far fa-user text-lg"></i>
      </div>
      <span class="font-bold text-slate-700 group-hover:text-primary">Sign In</span>
    </a>

    <a
      routerLink="/register"
      routerLinkActive="text-primary"
      class="group flex cursor-pointer items-center gap-2 rounded-2xl bg-primary px-3 py-3 text-white shadow-lg shadow-primary/20 transition-colors hover:bg-primary-strong"
    >
      <div
        class="flex h-11 w-11 items-center justify-center rounded-full bg-white/20 text-white transition-colors"
      >
        <i class="fas fa-user-plus text-lg"></i>
      </div>
      <span class="font-bold text-white">Sign Up</span>
    </a>
  </div>
</div>
