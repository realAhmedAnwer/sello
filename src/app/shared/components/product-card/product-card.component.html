<div
  class="group overflow-hidden rounded-card border border-white/70 bg-white/90 p-4 shadow-card backdrop-blur transition duration-300 hover:-translate-y-1 hover:shadow-card-hover"
>
  <div class="relative mb-4 overflow-hidden rounded-2xl bg-surface-alt">
    <img
      [src]="product().imageCover"
      [alt]="product().title"
      class="h-auto w-full object-contain transition duration-500 group-hover:scale-105"
    />

    <div class="absolute top-2 right-2 flex flex-col gap-2">
      <button
        (click)="addToWishlist(product()._id)"
        class="flex h-10 w-10 items-center justify-center rounded-full border border-white/80 bg-white/90 text-slate-600 shadow-sm transition-all hover:bg-primary hover:text-white"
      >
        <i class="far fa-heart"></i>
      </button>

      <button
        class="flex h-10 w-10 items-center justify-center rounded-full border border-white/80 bg-white/90 text-slate-600 shadow-sm transition-all hover:bg-primary hover:text-white"
      >
        <i class="fas fa-sync-alt"></i>
      </button>

      <button
        [routerLink]="['/product', product()._id, product().slug]"
        class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-full border border-white/80 bg-white/90 text-slate-600 shadow-sm transition-all hover:bg-primary hover:text-white"
      >
        <i class="far fa-eye"></i>
      </button>
    </div>
  </div>

  <div class="space-y-2">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-primary/70">
      {{ product().category.name }}
    </p>

    <h3
      class="line-clamp-2 min-h-14 text-lg font-semibold text-slate-800 transition-colors group-hover:text-primary"
    >
      {{ product().title }}
    </h3>

    <div class="flex items-center gap-2">
      <div class="flex gap-0.5 text-xs text-amber-400">
        @for (star of starIndexes; track star) {
          <i [class]="getStarIconClass(product().ratingsAverage, star)"></i>
        }
      </div>
      <span class="text-xs font-medium text-slate-500">
        {{ product().ratingsAverage }} ({{ product().ratingsQuantity }})
      </span>
    </div>

    <div class="flex items-center justify-between pt-3">
      <div class="flex flex-col">
        <span class="text-lg font-bold text-slate-900">
          {{ product().price | currency: 'EGP' : 'symbol' : '1.0-0' }}
        </span>
      </div>

      <button
        (click)="addToCart(product()._id)"
        class="flex h-11 w-11 items-center justify-center rounded-2xl bg-primary text-white shadow-lg shadow-primary/20 transition hover:bg-primary-strong active:scale-95"
      >
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>
</div>
